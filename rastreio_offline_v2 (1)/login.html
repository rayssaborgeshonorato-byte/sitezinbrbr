<!doctype html>
<html lang="pt-br">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Login - Sistema de Rastreamento</title>
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #FFFDE7;
      color: #333;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0
    }

    .card {
      background: #fff;
      padding: 24px;
      border-radius: 8px;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
      width: 360px
    }

    h2 {
      color: #FF8F00;
      margin-bottom: 8px
    }

    label {
      display: block;
      margin-top: 10px;
      font-weight: 600
    }

    input {
      width: 100%;
      padding: 10px;
      border: 2px solid #FFD600;
      border-radius: 6px;
      margin-top: 6px;
      font-size: 14px
    }

    button {
      margin-top: 16px;
      width: 100%;
      padding: 10px;
      background: #FFC107;
      border: none;
      border-radius: 6px;
      font-weight: 700;
      cursor: pointer
    }

    .error {
      color: #d32f2f;
      margin-top: 8px;
      display: none
    }

    .logo {
      display: flex;
      justify-content: center;
      margin-bottom: 12px
    }

    .logo img {
      height: 56px;
      filter: brightness(0.7) saturate(0.5)
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="logo"><img src="pngwing.com.png" alt="logo"></div>
    <h2>Entrar no Sistema</h2>
    <p>Faça login para acessar a área de criação e gestão de envios.</p>
    <label for="user">Usuário</label>
    <input id="user" autocomplete="username" />
    <label for="pass">Senha</label>
    <input id="pass" type="password" autocomplete="current-password" />
    <button id="btn">Entrar</button>
    <div id="err" class="error">Usuário ou senha incorretos.</div>
    <p style="font-size:12px;color:#666;margin-top:12px">Usuário de teste: <strong>chuva</strong> / Senha:
      <strong>0102</strong></p>
  </div>

  <script>
    (function () {
      const USER = "chuva";
      const PASS = "0102";

      if (localStorage.getItem('rastreio_logged') === '1') {
        window.location = 'criadorDeCodigoDeRastreio.html';
      }

      document.getElementById('btn').addEventListener('click', function () {
        const u = document.getElementById('user').value.trim();
        const p = document.getElementById('pass').value.trim();
        const err = document.getElementById('err');

        if (u === USER && p === PASS) {
          localStorage.setItem('rastreio_logged', '1');
          localStorage.setItem('rastreio_user', u);
          window.location = 'criadorDeCodigoDeRastreio.html';
        } else {
          err.style.display = 'block';
          setTimeout(() => err.style.display = 'none', 3000);
        }
      });

      document.getElementById('pass').addEventListener('keydown', function (e) {
        if (e.key === 'Enter') document.getElementById('btn').click();
      });
    })();
  </script>
</body>

</html>
