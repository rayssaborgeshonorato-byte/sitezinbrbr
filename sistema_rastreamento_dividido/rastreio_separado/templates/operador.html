<!DOCTYPE html>
<html>
<head><title>Painel do Operador</title></head>
<body>
    <h2>Bem-vindo, Operador</h2>
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <ul>{% for message in messages %}<li><strong>{{ message }}</strong></li>{% endfor %}</ul>
      {% endif %}
    {% endwith %}
    <form action="/gerar" method="post">
        <button type="submit">Cadastrar Envio</button>
    </form>
    <br><a href="/logout">Sair</a>
</body>
</html>
